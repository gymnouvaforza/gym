services:
  medusa:
    build:
      context: ./apps/medusa
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 9000
      DATABASE_URL: ${DATABASE_URL}
      MEDUSA_DB_INSECURE_SSL: ${MEDUSA_DB_INSECURE_SSL:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORE_CORS: ${STORE_CORS:-https://nuovaforzagym.com,http://localhost:3000,http://localhost:3001}
      ADMIN_CORS: ${ADMIN_CORS:-https://nuovaforzagym.com,http://localhost:3000,http://localhost:3001}
      AUTH_CORS: ${AUTH_CORS:-https://nuovaforzagym.com,http://localhost:3000,http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_ENVIRONMENT: ${PAYPAL_ENVIRONMENT:-sandbox}
      PAYPAL_AUTO_CAPTURE: ${PAYPAL_AUTO_CAPTURE:-true}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      S3_URL: ${S3_URL}
      S3_BUCKET: ${S3_BUCKET:-medusa-media}
      S3_REGION: ${S3_REGION:-eu-central-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      COMMERCE_CURRENCY_CODE: ${COMMERCE_CURRENCY_CODE:-PEN}
      MEDUSA_REGION_ID: ${MEDUSA_REGION_ID}
      MEDUSA_REGION_NAME: ${MEDUSA_REGION_NAME:-Peru}
      MEDUSA_COUNTRY_CODE: ${MEDUSA_COUNTRY_CODE:-PE}
    expose:
      - "9000"
    networks:
      - dokploy-network
      - gym-internal
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    hostname: redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - gym-internal

networks:
  dokploy-network:
    external: true
  gym-internal:
    driver: bridge
