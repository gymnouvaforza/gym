services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_COMMERCE_CURRENCY_CODE: ${NEXT_PUBLIC_COMMERCE_CURRENCY_CODE:-PEN}
        NEXT_PUBLIC_COMMERCE_LOCALE: ${NEXT_PUBLIC_COMMERCE_LOCALE:-es-PE}
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-https://api.gym.yampi.eu}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_MEDUSA_REGION_ID: ${NEXT_PUBLIC_MEDUSA_REGION_ID}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COMMERCE_PROVIDER: medusa
      STORE_ADMIN_PROVIDER: medusa
      COMMERCE_CURRENCY_CODE: ${COMMERCE_CURRENCY_CODE:-PEN}
      COMMERCE_LOCALE: ${COMMERCE_LOCALE:-es-PE}
      NEXT_PUBLIC_COMMERCE_CURRENCY_CODE: ${NEXT_PUBLIC_COMMERCE_CURRENCY_CODE:-PEN}
      NEXT_PUBLIC_COMMERCE_LOCALE: ${NEXT_PUBLIC_COMMERCE_LOCALE:-es-PE}
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-https://api.gym.yampi.eu}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-https://api.gym.yampi.eu}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY}
      NEXT_PUBLIC_MEDUSA_REGION_ID: ${NEXT_PUBLIC_MEDUSA_REGION_ID}
      MEDUSA_ADMIN_API_KEY: ${MEDUSA_ADMIN_API_KEY}
      MEDUSA_REGION_ID: ${MEDUSA_REGION_ID}
      MEDUSA_REGION_NAME: ${MEDUSA_REGION_NAME:-Peru}
      MEDUSA_COUNTRY_CODE: ${MEDUSA_COUNTRY_CODE:-PE}
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_ENVIRONMENT: ${PAYPAL_ENVIRONMENT:-sandbox}
      PAYPAL_AUTO_CAPTURE: ${PAYPAL_AUTO_CAPTURE:-true}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
    expose:
      - "3000"
    networks:
      - dokploy-network

  medusa:
    build:
      context: ./apps/medusa
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 9000
      DATABASE_URL: ${DATABASE_URL}
      MEDUSA_DB_INSECURE_SSL: ${MEDUSA_DB_INSECURE_SSL:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORE_CORS: ${STORE_CORS:-https://gym.yampi.eu}
      ADMIN_CORS: ${ADMIN_CORS:-https://gym.yampi.eu,https://api.gym.yampi.eu}
      AUTH_CORS: ${AUTH_CORS:-https://gym.yampi.eu,https://api.gym.yampi.eu}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_ENVIRONMENT: ${PAYPAL_ENVIRONMENT:-sandbox}
      PAYPAL_AUTO_CAPTURE: ${PAYPAL_AUTO_CAPTURE:-true}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      S3_URL: ${S3_URL}
      S3_BUCKET: ${S3_BUCKET:-medusa-media}
      S3_REGION: ${S3_REGION:-eu-central-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      COMMERCE_CURRENCY_CODE: ${COMMERCE_CURRENCY_CODE:-PEN}
      MEDUSA_REGION_ID: ${MEDUSA_REGION_ID}
      MEDUSA_REGION_NAME: ${MEDUSA_REGION_NAME:-Peru}
      MEDUSA_COUNTRY_CODE: ${MEDUSA_COUNTRY_CODE:-PE}
    expose:
      - "9000"
    networks:
      - dokploy-network
      - gym-internal
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    hostname: redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - gym-internal

networks:
  dokploy-network:
    external: true
  gym-internal:
    driver: bridge
